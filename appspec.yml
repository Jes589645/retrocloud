version: 0.0
os: windows
files:
  - source: \app
    destination: C:\retrocloud\app
  - source: \scripts
    destination: C:\retrocloud\scripts
hooks:
  BeforeInstall:
    - location: scripts\stop.ps1
      timeout: 180
      runas: Administrator
  AfterInstall:
    - location: scripts\install.ps1
      timeout: 600
      runas: Administrator
  ApplicationStart:
    - location: scripts\start.ps1
      timeout: 180
      runas: Administrator
